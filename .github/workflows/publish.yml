name: Publish Python 🐍 distribution 📦 to PyPI and GitHub Releases

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build distribution 📦
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install pypa/build
        run: python -m pip install build --user

      - name: Build a binary wheel and a source tarball
        run: python -m build

      - name: Store the distribution packages
        uses: actions/upload-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

  publish-to-pypi:
    name: Publish distribution �� to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/sysdtime-py
    permissions:
      id-token: write

    steps:
      - name: Download all the dists
        uses: actions/download-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

      - name: Publish distribution 📦 to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  create-github-release:
    name: Create GitHub Release
    needs:
      - publish-to-pypi
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate changelog from tag
        id: changelog
        run: |
          # Get the tag from GitHub
          tag=${GITHUB_REF#refs/tags/}
          version=${tag#v}
          
          # Get commits since previous tag
          previous_tag=$(git describe --tags --abbrev=0 ${tag}^ 2>/dev/null || echo "")
          
          if [ -z "$previous_tag" ]; then
            # First release: all commits
            commits=$(git log --pretty=format:"* %h - %s (%an)" | head -100)
          else
            # Commits since previous tag
            commits=$(git log "${previous_tag}..${tag}" --pretty=format:"* %h - %s (%an)")
          fi
          
          # Write changelog
          {
            echo "## Release ${version}"
            echo ""
            echo "### Commits"
            echo ""
            if [ -z "$commits" ]; then
              echo "No new commits"
            else
              echo "$commits"
            fi
          } > changelog.txt
          
          cat changelog.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          body_path: changelog.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Clean up
        run: rm -f changelog.txt
